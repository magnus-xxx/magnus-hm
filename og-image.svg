<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f7f7f5"/>
    </linearGradient>
    <linearGradient id="lime-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#BAFA35"/>
      <stop offset="100%" style="stop-color:#A8E620"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles top-right -->
  <circle cx="1050" cy="120" r="260" fill="none" stroke="#111110" stroke-width="1" opacity="0.06"/>
  <circle cx="1050" cy="120" r="380" fill="none" stroke="#111110" stroke-width="1" opacity="0.04"/>
  <circle cx="1050" cy="120" r="500" fill="none" stroke="#111110" stroke-width="0.8" opacity="0.025"/>

  <!-- Lime glow blob -->
  <ellipse cx="900" cy="260" rx="340" ry="240" fill="#BAFA35" opacity="0.09"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="5" height="80" rx="3" fill="url(#lime-grad)"/>

  <!-- Eyebrow label -->
  <text x="102" y="108" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        fill="#888884" letter-spacing="3">PM &amp; DIGITAL STRATEGIST</text>

  <!-- Main name -->
  <text x="80" y="230" font-family="Arial Black, Arial, sans-serif" font-size="120" font-weight="900"
        fill="#111110" letter-spacing="-3">MAGNUS</text>

  <!-- Gray subtitle -->
  <text x="80" y="305" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900"
        fill="#BBBBBB" letter-spacing="-1">PRODUCT MANAGER.</text>

  <!-- Divider line -->
  <rect x="80" y="340" width="480" height="1.5" fill="#111110" opacity="0.1"/>

  <!-- Description -->
  <text x="80" y="378" font-family="Arial, sans-serif" font-size="18" fill="#888884" font-weight="400">
    7+ years · Data Products · AI Applications · E-Commerce Growth
  </text>

  <!-- Pills row -->
  <!-- Pill 1 -->
  <rect x="80" y="408" width="140" height="34" rx="17" fill="#BAFA35" opacity="0.2"/>
  <text x="150" y="430" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        fill="#5A8000" text-anchor="middle">Product Strategy</text>

  <!-- Pill 2 -->
  <rect x="232" y="408" width="130" height="34" rx="17" fill="#BAFA35" opacity="0.2"/>
  <text x="297" y="430" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        fill="#5A8000" text-anchor="middle">Data Analytics</text>

  <!-- Pill 3 -->
  <rect x="374" y="408" width="140" height="34" rx="17" fill="#BAFA35" opacity="0.2"/>
  <text x="444" y="430" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        fill="#5A8000" text-anchor="middle">AI &amp; Automation</text>

  <!-- Availability dot + text -->
  <circle cx="84" cy="492" r="5" fill="#22C55E"/>
  <text x="98" y="497" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#333330">
    Available for new projects
  </text>

  <!-- URL -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="14" fill="#BBBBBB" font-weight="400">
    magnus-xxx.github.io/magnus-hm
  </text>

  <!-- Right: Logo M block -->
  <rect x="880" y="440" width="200" height="110" rx="20" fill="#111110"/>
  <text x="980" y="518" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900"
        fill="#BAFA35" text-anchor="middle" letter-spacing="-2">M.</text>

</svg>
